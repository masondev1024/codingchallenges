name: 📊 README 자동 업데이트

on:
  push:
    branches: [main]
    paths:
      - 'Level**/*.py'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: README 문제 수 업데이트
        run: |
          python3 << 'EOF'
          import os, re

          counts = {}
          for level in range(5):
              folder = f"Level{level}"
              if os.path.isdir(folder):
                  counts[level] = len([f for f in os.listdir(folder) if f.endswith('.py')])
              else:
                  counts[level] = 0

          total = sum(counts.values())

          table = "| 레벨 | 문제 수 |\n|------|--------|\n"
          for level, count in counts.items():
              table += f"| Level {level} | {count} |\n"
          table += f"\n> 총 **{total}**문제 풀이 완료 🎉"

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          new_content = re.sub(
              r'\| 레벨 \| 문제 수 \|.*',
              table,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_content)

          print(f"✅ README 업데이트 완료 (총 {total}문제)")
          EOF

      - name: README 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "📊 README 자동 업데이트"
          git push
